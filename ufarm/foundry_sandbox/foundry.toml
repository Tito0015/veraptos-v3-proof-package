[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"

# Solc version for UFarm compatibility
solc_version = "0.8.24"

# Gas settings
gas_limit = 30000000
gas_price = 20000000000

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Verbosity for detailed traces
verbosity = 4

# Enable detailed traces for empirical audit
gas_reports = ["*"]